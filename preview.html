<!doctype html>
<html>
<head>
<meta charset="utf-8"><title>mermaidfix</title>
<style>
  body { margin:0; display:flex; height:100vh; font-family:-apple-system,"PingFang SC",sans-serif }
  #left { width:34%; min-width:300px; display:flex; flex-direction:column; border-right:1px solid #e2e8f0 }
  #bar { padding:8px 12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid #e2e8f0; font-size:13px }
  #src { flex:1; border:0; outline:none; padding:12px; font:12px/1.55 "SF Mono",Menlo,monospace; resize:none; color:#1e293b }
  #err { color:#dc2626; font-size:12px; padding:6px 12px; white-space:pre-wrap; display:none; border-top:1px solid #fecaca; background:#fef2f2; max-height:30vh; overflow:auto }
  #err.fixing { color:#713f12; background:#fef9c3; border-top-color:#eab308 }
  #err.ok { color:#14532d; background:#dcfce7; border-top-color:#16a34a }
  #board { flex:1; position:relative }
  button, select { font-size:12px; padding:4px 10px; border:1px solid #cbd5e1; border-radius:6px; background:#fff; cursor:pointer }
  button:hover { background:#f1f5f9 }
  #status { color:#64748b; margin-left:auto }
  /* 历史面板:短名 + 时间,点击跳转,✏️ 重命名 */
  #fwrap { position:relative }
  #fname { max-width:200px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  #flist { display:none; position:absolute; top:110%; left:0; z-index:30; width:320px; max-height:60vh; overflow:auto;
           background:#fff; border:1px solid #e2e8f0; border-radius:10px; box-shadow:0 8px 24px rgba(0,0,0,.12); padding:4px }
  #flist.open { display:block }
  .fitem { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:8px; cursor:pointer }
  .fitem:hover { background:#f1f5f9 }
  .fitem.cur { background:#dbeafe }
  .fmain { flex:1; min-width:0 }
  .ft { font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
  .ft.unnamed { color:#94a3b8; font-weight:400 }
  .fmeta { font-size:11px; color:#94a3b8 }
  .fedit, .farch { border:none; background:none; cursor:pointer; font-size:13px; opacity:0; padding:2px; white-space:nowrap }
  .fitem:hover .fedit, .fitem:hover .farch { opacity:.7 }
  .farch[data-ask] { opacity:1; color:#dc2626; font-size:12px; font-weight:600 }
  .fitem.arch .ft { color:#94a3b8; font-weight:400 }
  #farchhead { padding:7px 10px; font-size:12px; color:#64748b; cursor:pointer; border-top:1px solid #e2e8f0; margin-top:4px }
  #farchhead:hover { background:#f1f5f9 }
  .fmain input { width:100%; border:1px solid #2563eb; border-radius:6px; padding:2px 6px; font:600 13px inherit; outline:none }
  /* 解惑抽屉 */
  #chat { position:absolute; top:0; right:0; bottom:0; width:380px; background:#fff;
          border-left:1px solid #e2e8f0; box-shadow:-4px 0 16px rgba(0,0,0,.08); z-index:20;
          display:flex; flex-direction:column; transform:translateX(100%); transition:transform .2s }
  #chat.open { transform:none }
  #chat-head { padding:10px 14px; border-bottom:1px solid #e2e8f0; display:flex; align-items:center; gap:8px; font-size:13px }
  #chat-head b { margin-right:auto }
  #chat-msgs { flex:1; overflow:auto; padding:12px; display:flex; flex-direction:column; gap:10px }
  .msg { max-width:88%; padding:8px 11px; border-radius:10px; font-size:13px; line-height:1.65; word-break:break-word; overflow-wrap:anywhere }
  .msg.user { align-self:flex-end; background:#dbeafe; color:#1e3a8a; white-space:pre-wrap }
  .msg.ai { align-self:flex-start; background:#f1f5f9; color:#1e293b }
  .msg.err { align-self:flex-start; background:#fef2f2; color:#dc2626; border:1px solid #fecaca; white-space:pre-wrap }
  /* AI 气泡内的 markdown 渲染样式 */
  .msg p { margin:0 0 7px } .msg :last-child { margin-bottom:0 }
  .msg ul, .msg ol { margin:0 0 7px; padding-left:18px }
  .msg li { margin:3px 0 }
  .msg code { background:#e2e8f0; border-radius:4px; padding:1px 5px; font:12px ui-monospace,SFMono-Regular,Menlo,monospace }
  .msg pre { background:#0f172a; color:#e2e8f0; border-radius:8px; padding:8px 10px; margin:0 0 7px; overflow-x:auto; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre }
  .msg hr { border:none; border-top:1px solid #cbd5e1; margin:8px 0 }
  .msg table { border-collapse:collapse; margin:0 0 7px; display:block; overflow-x:auto; max-width:100% }
  .msg th, .msg td { border:1px solid #cbd5e1; padding:3px 8px; font-size:12px; text-align:left; white-space:nowrap }
  .msg td { white-space:normal }
  .msg th { background:#e2e8f0 }
  #chat-foot { border-top:1px solid #e2e8f0; padding:10px 12px; display:flex; flex-direction:column; gap:6px }
  #chat-in { border:1px solid #cbd5e1; border-radius:8px; padding:8px 10px; font:13px/1.5 inherit; resize:none; min-height:38px; max-height:120px; outline:none }
  #chat-ops { display:flex; align-items:center; gap:10px; font-size:12px; color:#475569 }
  #chat-ops label { display:flex; align-items:center; gap:4px; cursor:pointer }
</style>
<script>window.EXCALIDRAW_ASSET_PATH = 'https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/';</script>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@excalidraw/excalidraw@0.17.6/dist/excalidraw.production.min.js"></script>
</head>
<body>
<div id="left">
  <div id="bar">
    <div id="fwrap">
      <button id="fname"></button>
      <div id="flist"></div>
    </div>
    <button id="save">保存 ⌘S</button>
    <button id="copy">复制代码</button>
    <button id="detach">转可编辑</button>
    <button id="clear">重置画板</button>
    <button id="chat-toggle">对话</button>
    <span id="status"></span>
  </div>
  <textarea id="src" spellcheck="false"></textarea>
  <div id="err"><span id="err-text"></span> <button id="err-fix">让 AI 修</button></div>
</div>
<div id="board"></div>
<div id="chat">
  <div id="chat-head">
    <b>解惑 · 只答不改</b>
    <button id="chat-clear">清空</button>
    <button id="chat-close">✕</button>
  </div>
  <div id="chat-msgs"></div>
  <div id="chat-foot">
    <textarea id="chat-in" placeholder="对这张图有什么不清楚的,直接问…(Enter 发送)"></textarea>
    <div id="chat-ops">
      <label><input type="checkbox" id="chat-deep">深想(慢但更聪明)</label>
    </div>
  </div>
</div>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  import elkLayouts from 'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0/dist/mermaid-layout-elk.esm.min.mjs';
  mermaid.registerLayoutLoaders(elkLayouts);
  mermaid.initialize({ startOnLoad: false });

  const file = new URLSearchParams(location.search).get('f') || 'roadmap.mmd';
  const $ = id => document.getElementById(id);
  document.title = 'mermaidfix · ' + file;
  // ---------- 历史面板:AI 短名 + 跳转 + 重命名(名字存 serve.py 的 names.json) ----------
  let flist = await fetch('/list').then(r => r.json()).catch(() => []);
  if (!flist.some(x => x.f === file)) flist.unshift({ f: file, t: '', m: '' });
  const titleOf = f => (flist.find(x => x.f === f) || {}).t || '';
  function setHead() {
    $('fname').textContent = (titleOf(file) || file) + ' ▾';
    document.title = 'mermaidfix · ' + (titleOf(file) || file);
  }
  setHead();
  async function refreshList() {
    try { flist = await (await fetch('/list')).json(); } catch {}
    setHead();
    if ($('flist').classList.contains('open')) renderFlist();
  }
  let showArch = false;
  function renderFlist() {
    const row = (x, i) => `
      <div class="fitem${x.f === file ? ' cur' : ''}${x.a ? ' arch' : ''}" data-i="${i}">
        <div class="fmain">
          <div class="ft${x.t ? '' : ' unnamed'}">${escHtml(x.t || x.f)}</div>
          <div class="fmeta">${escHtml(x.f)} · ${x.m}</div>
        </div>
        <button class="fedit" title="重命名 (⌃R)">✏️</button>
        <button class="farch" title="${x.a ? '恢复' : '归档 (⌃D)'}">${x.a ? '↩️' : '🗄'}</button>
      </div>`;
    const act = [], arc = [];
    flist.forEach((x, i) => (x.a ? arc : act).push(row(x, i)));
    $('flist').innerHTML = act.join('')
      + (arc.length ? `<div id="farchhead">${showArch ? '▾' : '▸'} 已归档 ${arc.length} 个</div>` : '')
      + (showArch ? arc.join('') : '');
  }
  async function setArch(f, on) {
    await fetch('/archive', { method: 'POST', body: JSON.stringify({ f, on }) }).catch(() => {});
    await refreshList();
  }
  let naming = false;
  async function lazyName() { // 面板打开时给没名字的老文件逐个补名(串行,最多 8 个)
    if (naming) return;
    naming = true;
    try {
      for (const x of flist.filter(x => !x.t && !x.a && !x.f.endsWith('-raw.mmd')).slice(0, 8)) {
        const r = await fetch('/autoname', { method: 'POST', body: JSON.stringify({ f: x.f }) }).catch(() => null);
        if (!r || !r.ok) break;
        await refreshList();
      }
    } finally { naming = false; }
  }
  function startRename(i, itemEl) {
    const x = flist[i], main = itemEl.querySelector('.fmain');
    main.innerHTML = '<input>';
    const inp = main.querySelector('input');
    inp.value = x.t || '';
    inp.focus(); inp.select();
    let closed = false;
    const done = async ok => {
      if (closed) return;
      closed = true;
      if (ok && inp.value.trim() !== (x.t || '')) {
        await fetch('/rename', { method: 'POST', body: JSON.stringify({ f: x.f, title: inp.value.trim() }) }).catch(() => {});
        x.t = inp.value.trim();
        if (x.f === file) setHead();
      }
      renderFlist();
    };
    inp.onkeydown = ev => {
      ev.stopPropagation();
      if (ev.key === 'Enter' && !ev.isComposing) done(true);
      if (ev.key === 'Escape') done(false);
    };
    inp.onblur = () => done(true);
    inp.onclick = ev => ev.stopPropagation();
  }
  $('fname').onclick = e => {
    e.stopPropagation();
    renderFlist();
    $('flist').classList.toggle('open');
    lazyName();
  };
  document.addEventListener('click', () => $('flist').classList.remove('open'));
  $('flist').onclick = e => {
    e.stopPropagation();
    if (e.target.id === 'farchhead') { showArch = !showArch; renderFlist(); return; }
    const item = e.target.closest('.fitem');
    if (!item || item.querySelector('input')) return;
    const i = +item.dataset.i, x = flist[i];
    if (e.target.closest('.fedit')) return startRename(i, item);
    const ab = e.target.closest('.farch');
    if (ab) {
      if (x.a) return setArch(x.f, false); // 恢复不用确认
      if (ab.dataset.ask) return setArch(x.f, true); // 第二次点:执行归档
      ab.dataset.ask = '1';
      ab.textContent = '确认归档?';
      setTimeout(() => { ab.removeAttribute('data-ask'); ab.textContent = '🗄'; }, 3000);
      return;
    }
    location.href = '?f=' + encodeURIComponent(x.f);
  };
  // ⌃R 重命名当前图 / ⌃D 归档当前图(再按一次确认);输入框里不拦(mac 的 ⌃D 是删字)
  function flash(msg) {
    $('status').textContent = msg;
    clearTimeout(flash.t);
    flash.t = setTimeout(() => { $('status').textContent = dirty ? '未保存' : ''; }, 3000);
  }
  function renameCurrent() {
    const i = flist.findIndex(x => x.f === file);
    if (i < 0) return;
    if (flist[i].a) showArch = true; // 当前图在归档区,展开才有行可编辑
    renderFlist();
    $('flist').classList.add('open');
    startRename(i, $('flist').querySelector('.fitem.cur'));
  }
  let archAsk = 0;
  addEventListener('keydown', e => {
    if (!e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.target.closest?.('input, textarea, [contenteditable="true"]')) return;
    if (e.key === 'r' || e.key === 'R') { e.preventDefault(); renameCurrent(); return; }
    if (e.key !== 'd' && e.key !== 'D') return;
    e.preventDefault();
    const x = flist.find(x => x.f === file);
    if (!x || x.a) { flash('这张图已在归档里'); return; }
    if (Date.now() - archAsk < 3000) {
      archAsk = 0;
      setArch(file, true).then(() => flash('已归档「' + (titleOf(file) || file) + '」,历史面板底部可恢复'));
    } else {
      archAsk = Date.now();
      flash('⚠ 再按一次 ⌃D 确认归档当前图');
    }
  }, true);
  $('src').value = await (await fetch('./' + file + '?ts=' + Date.now())).text();

  // ---------- Excalidraw 画布:mermaid 图 = 锁定底图,笔迹画在上层 ----------
  const drawKey = 'draw:' + file;
  const detachKey = 'detach:' + file;
  let api = null, baseId = null, fileSeq = 0, pendingSvg = null, fitted = false, ready = false;
  let detached = localStorage.getItem(detachKey) === '1'; // 可编辑模式:图已转元素,不再灌底图

  function applySvg(svg) {
    // mermaid 返回 HTML 序列化的字符串(<br> 不闭合等),<img> 按严格 XML 解析会炸;
    // 经 DOM 走一遍 XMLSerializer 拿到合规 XML,并给出绝对尺寸
    const tmp = document.createElement('div');
    tmp.innerHTML = svg;
    const node = tmp.querySelector('svg');
    const vb = node.viewBox?.baseVal;
    const w = vb?.width || parseFloat(node.getAttribute('width')) || 800;
    const h = vb?.height || parseFloat(node.getAttribute('height')) || 600;
    node.setAttribute('width', w);
    node.setAttribute('height', h);
    const xml = new XMLSerializer().serializeToString(node);
    const fileId = 'mf' + (++fileSeq);
    const dataURL = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(xml)));
    api.addFiles([{ id: fileId, mimeType: 'image/svg+xml', dataURL, created: Date.now() }]);
    const others = api.getSceneElements().filter(el => el.id !== baseId);
    const base = ExcalidrawLib.convertToExcalidrawElements(
      [{ type: 'image', fileId, x: 0, y: 0, width: w, height: h, locked: true }])[0];
    baseId = base.id;
    api.updateScene({ elements: [base, ...others] });
    if (!fitted) {
      fitted = true;
      try { api.scrollToContent(undefined, { fitToViewport: true, viewportZoomFactor: 0.9 }); } catch {}
    }
  }

  let persistTimer;
  function persist(els) {
    clearTimeout(persistTimer);
    persistTimer = setTimeout(() => {
      const drawn = els.filter(e => e.id !== baseId && !e.isDeleted);
      if (drawn.length) localStorage.setItem(drawKey, JSON.stringify(drawn));
      else localStorage.removeItem(drawKey);
    }, 500);
  }

  const App = () => React.createElement(ExcalidrawLib.Excalidraw, {
    excalidrawAPI: a => {
      // 组件首帧挂载前 updateScene 会被初始化覆盖,推迟两帧再灌底图和笔迹
      requestAnimationFrame(() => requestAnimationFrame(() => {
        api = a; window._api = a;
        const saved = JSON.parse(localStorage.getItem(drawKey) || '[]');
        if (saved.length) api.updateScene({ elements: saved });
        if (pendingSvg) { applySvg(pendingSvg); pendingSvg = null; }
        ready = true; // 此后才允许持久化,防初始化空场景覆盖存档
      }));
    },
    onChange: els => { if (ready) persist(els); },
    langCode: 'zh-CN',
    initialData: { appState: { viewBackgroundColor: '#ffffff' } },
  });
  ReactDOM.createRoot($('board')).render(React.createElement(App));

  // 转可编辑:mermaid → 原生画板元素(官方 mermaid-to-excalidraw),双击改字/改色/拖动;
  // 转换是拷贝,与左侧代码脱钩;笔迹保留,底图移除
  $('detach').onclick = async () => {
    if (detached) { $('status').textContent = '已是可编辑模式(重置画板可回底图)'; return; }
    $('status').textContent = '转换中…(首次需加载转换库)';
    try {
      const { parseMermaidToExcalidraw } =
        await import('https://esm.sh/@excalidraw/mermaid-to-excalidraw@1.1.0');
      const bare = $('src').value.replace(/^---\n[\s\S]*?\n---\n/, ''); // 剥 frontmatter,转换器不认 elk
      const { elements, files } = await parseMermaidToExcalidraw(bare, { fontSize: 14 });
      const converted = ExcalidrawLib.convertToExcalidrawElements(elements);
      if (files) api.addFiles(Object.values(files));
      const drawings = api.getSceneElements().filter(el => el.id !== baseId);
      api.updateScene({ elements: [...converted, ...drawings] });
      baseId = null;
      detached = true; localStorage.setItem(detachKey, '1');
      try { api.scrollToContent(undefined, { fitToViewport: true, viewportZoomFactor: 0.9 }); } catch {}
      $('status').textContent = '已转可编辑:双击改字,选中改色/字号';
    } catch (e) {
      $('status').textContent = '转换失败: ' + String(e.message || e).slice(0, 60);
    }
  };

  $('clear').onclick = () => {
    localStorage.removeItem(drawKey);
    localStorage.removeItem(detachKey);
    detached = false; baseId = null; fitted = false;
    api.updateScene({ elements: [] });
    render(); // 底图模式回归
  };

  // 数字键重映射:1=拖拽手 2=选择 3=矩形 4=菱形 5=圆(Excalidraw 硬编码 1=选择…,
  // capture 层拦下自己派发;字母快捷键 H/V/R/D/O 等不受影响)
  const KEYMAP = { '1': 'hand', '2': 'selection', '3': 'rectangle', '4': 'diamond', '5': 'ellipse' };
  addEventListener('keydown', e => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (!api || !(e.key in KEYMAP)) return;
    if (e.target.closest?.('input, textarea, [contenteditable="true"]')) return;
    e.preventDefault(); e.stopPropagation();
    api.setActiveTool({ type: KEYMAP[e.key] });
  }, true);

  // 工具栏数字角标同步改成重映射后的键位(按 data-testid 定位,幂等)
  function fixBadges() {
    const sampleParent = document.querySelector('[data-testid="toolbar-selection"]')
      ?.closest('label')?.querySelector('.ToolIcon__keybinding')?.parentElement;
    if (!sampleParent) return;
    for (const [tool, txt] of [['hand','1'], ['selection','2'], ['rectangle','3'],
                               ['diamond','4'], ['ellipse','5'], ['arrow','']]) {
      const label = document.querySelector(`[data-testid="toolbar-${tool}"]`)?.closest('label');
      if (!label) continue;
      let k = label.querySelector('.ToolIcon__keybinding');
      if (!k) {
        k = document.createElement('span');
        k.className = sampleParent.querySelector('.ToolIcon__keybinding')?.className || 'ToolIcon__keybinding';
        (label.querySelector('.' + sampleParent.classList[0]) || label).appendChild(k);
      }
      k.textContent = txt;
    }
  }
  setTimeout(fixBadges, 1200);
  setTimeout(fixBadges, 3500); // locale 异步加载可能重绘 toolbar,再补一次

  // ---------- 渲染管线(错误时保留上一张好图) ----------
  let seq = 0, timer, dirty = false;
  let autoFixTried = false, fixing = false, lastErr = '';
  async function render() {
    const id = 'g' + (++seq);
    try {
      const { svg } = await mermaid.render(id, $('src').value);
      if (!detached) { api ? applySvg(svg) : pendingSvg = svg; } // 可编辑模式下只做语法校验
      $('err').style.display = 'none';
    } catch (e) {
      lastErr = e.message;
      $('err-text').textContent = e.message;
      $('err').style.display = 'block';
      document.getElementById(id)?.remove();
      document.getElementById('d' + id)?.remove();
      if (dirty) return; // 手动编辑中的错误不打扰
      // 第一道防线:确定性清理畸形 linkStyle(数字长龙/尾逗号),瞬时、不劳 AI
      const cleaned = quickFix($('src').value);
      if (cleaned !== $('src').value) {
        $('src').value = cleaned;
        await save();
        await render(); // 仍失败会再进 catch,此时 quickFix 无变化,落到 AI 回炉
        if ($('err').style.display === 'none') {
          $('err').className = 'ok';
          $('err-text').textContent = '✅ 已自动清理畸形 linkStyle,已保存';
          $('err').style.display = 'block';
          setTimeout(() => { if ($('err').className === 'ok') { $('err').style.display = 'none'; $('err').className = ''; } }, 3000);
        }
        return;
      }
      // 第二道防线:AI 回炉一次
      if (!autoFixTried) { autoFixTried = true; aiFix(); }
    }
  }

  // 确定性清理:AI 偶发把 linkStyle 写成 0,1,…,2496 数字长龙(整行删,纯装饰无语义)或留尾逗号
  function quickFix(code) {
    return code.split('\n').filter(l => !(/^\s*linkStyle\s/.test(l) && l.length > 500))
      .map(l => /^\s*linkStyle\s/.test(l)
        ? l.replace(/,\s*$/, '').replace(/(\d)\s*,\s+(?=stroke|fill|color)/, '$1 ')
        : l)
      .join('\n');
  }

  // 修复中/失败时画布上放占位图,不留空白黑盒
  async function fixPlaceholder(label, style) {
    if (detached || !api) return;
    try {
      const { svg } = await mermaid.render('fixph' + Date.now(),
        'flowchart LR\n  W["' + label + '"]\n  style W ' + style);
      applySvg(svg);
    } catch {}
  }

  // 渲染错误回炉:坏代码+报错 → /fix → AI 最小修复 → 覆写保存重渲
  async function aiFix() {
    if (fixing) return;
    fixing = true;
    const bad = $('src').value, badErr = lastErr, t0 = Date.now();
    $('err').className = 'fixing';
    $('err-fix').style.display = 'none';
    const tick = () => $('err-text').textContent =
      '🔧 AI 修复中… ' + Math.round((Date.now() - t0) / 1000) + 's(已把代码和报错发给 AI,一般 5~20 秒)\n报错: ' + badErr.slice(0, 120);
    tick();
    const iv = setInterval(tick, 1000);
    fixPlaceholder('🔧 AI 修复中… 修好会自动重渲', 'fill:#fef9c3,stroke:#eab308,color:#713f12');
    try {
      const r = await fetch('/fix', {
        method: 'POST',
        body: JSON.stringify({ code: bad, error: badErr }),
      });
      if (!r.ok) throw new Error((await r.json().catch(() => ({}))).error || 'HTTP ' + r.status);
      const { code } = await r.json();
      clearInterval(iv);
      $('src').value = code;
      dirty = false;
      await save();
      await render();
      if ($('err').style.display === 'none') { // 修好了:绿条报战果,3 秒后收起
        const a = bad.split('\n'), b = code.split('\n');
        const changed = Math.max(a.length, b.length) - a.filter((l, i) => l === b[i]).length;
        $('err').className = 'ok';
        $('err-text').textContent = '✅ AI 已修复(改动 ' + changed + ' 行,耗时 ' + Math.round((Date.now() - t0) / 1000) + 's),已保存';
        $('err').style.display = 'block';
        setTimeout(() => { if (!fixing && $('err').className === 'ok') { $('err').style.display = 'none'; $('err').className = ''; } }, 3000);
      } else { // AI 修了一版仍渲染失败:红条如实报,不再自动循环
        $('err').className = '';
        $('err-text').textContent = '⚠ AI 修了一版仍有错: ' + lastErr.slice(0, 120) + '\n可再点「让 AI 修」或手动改左侧代码';
        fixPlaceholder('❌ 仍有渲染错误,见左下角', 'fill:#fee2e2,stroke:#dc2626,color:#7f1d1d');
      }
    } catch (e) {
      $('err').className = '';
      $('err-text').textContent = badErr + '\n⇒ AI 修复失败: ' + e.message + '(可再点「让 AI 修」重试)';
      fixPlaceholder('❌ AI 修复失败,可点「让 AI 修」重试', 'fill:#fee2e2,stroke:#dc2626,color:#7f1d1d');
    } finally {
      clearInterval(iv);
      $('err-fix').style.display = '';
      fixing = false;
    }
  }
  $('err-fix').onclick = aiFix;
  $('src').addEventListener('input', () => {
    dirty = true;
    $('status').textContent = '未保存';
    clearTimeout(timer); timer = setTimeout(render, 400);
  });

  async function save() {
    const r = await fetch('/save', { method: 'POST', body: JSON.stringify({ file, code: $('src').value }) });
    dirty = !r.ok;
    if (r.ok) diskCache = $('src').value;
    $('status').textContent = r.ok ? '已保存 ' + new Date().toLocaleTimeString() : '保存失败(serve.py 没在跑?)';
  }
  $('save').onclick = save;
  addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); save(); }
  });
  addEventListener('beforeunload', e => { if (dirty) e.preventDefault(); });
  $('copy').onclick = async () => {
    await navigator.clipboard.writeText($('src').value);
    $('status').textContent = '已复制';
  };
  render();

  // ---------- 解惑对话:只答不改,serve.py /chat 代理,SSE 流式 ----------
  const chatKey = 'chat:' + file;
  let chatMsgs = JSON.parse(localStorage.getItem(chatKey) || '[]');
  let chatBusy = false;

  // 迷你 markdown 渲染:只认 AI 回答会用到的记号(粗体/行内代码/代码块/列表/标题)。
  // 先整体转义 HTML 再做转换,AI 文本不会注入;不引 CDN 库。
  const escHtml = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const mdInline = s => escHtml(s)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  function mdHtml(text) {
    const lines = text.split('\n'), out = [];
    let i = 0;
    while (i < lines.length) {
      const l = lines[i];
      if (/^```/.test(l)) {
        const buf = []; i++;
        while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
        i++;
        out.push('<pre>' + escHtml(buf.join('\n')) + '</pre>');
      } else if (/^\s*[-*]\s+/.test(l)) {
        const items = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i]))
          items.push('<li>' + mdInline(lines[i++].replace(/^\s*[-*]\s+/, '')) + '</li>');
        out.push('<ul>' + items.join('') + '</ul>');
      } else if (/^\s*\d+[.、]\s*\S/.test(l)) {
        const items = [];
        while (i < lines.length && /^\s*\d+[.、]\s*\S/.test(lines[i]))
          items.push('<li>' + mdInline(lines[i++].replace(/^\s*\d+[.、]\s*/, '')) + '</li>');
        out.push('<ol>' + items.join('') + '</ol>');
      } else if (/^#{1,4}\s+/.test(l)) {
        out.push('<p><b>' + mdInline(l.replace(/^#{1,4}\s+/, '')) + '</b></p>'); i++;
      } else if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l)) {
        out.push('<hr>'); i++;
      } else if (/^\s*\|/.test(l)) {
        const rows = [];
        while (i < lines.length && /^\s*\|/.test(lines[i]))
          rows.push(lines[i++].trim().replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim()));
        const sep = rows.length > 1 && rows[1].every(c => /^:?-+:?$/.test(c));
        out.push('<table>' + rows.map((cells, r) => {
          if (sep && r === 1) return '';
          const tag = sep && r === 0 ? 'th' : 'td';
          return '<tr>' + cells.map(c => '<' + tag + '>' + mdInline(c) + '</' + tag + '>').join('') + '</tr>';
        }).join('') + '</table>');
      } else if (!l.trim()) {
        i++;
      } else {
        const buf = [];
        while (i < lines.length && lines[i].trim() &&
               !/^(```|#{1,4}\s|\s*[-*]\s+|\s*\d+[.、]\s*\S|\s*\||\s*(-{3,}|\*{3,}|_{3,})\s*$)/.test(lines[i]))
          buf.push(mdInline(lines[i++]));
        out.push('<p>' + buf.join('<br>') + '</p>');
      }
    }
    return out.join('');
  }

  function bubble(role, text) {
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    if (role === 'ai') d.innerHTML = mdHtml(text);
    else d.textContent = text;
    $('chat-msgs').appendChild(d);
    $('chat-msgs').scrollTop = $('chat-msgs').scrollHeight;
    return d;
  }
  chatMsgs.forEach(m => bubble(m.role === 'user' ? 'user' : 'ai', m.content));

  $('chat-toggle').onclick = () => $('chat').classList.toggle('open');
  $('chat-close').onclick = () => $('chat').classList.remove('open');
  $('chat-clear').onclick = () => {
    chatMsgs = [];
    localStorage.removeItem(chatKey);
    $('chat-msgs').innerHTML = '';
  };

  async function chatSend() {
    const q = $('chat-in').value.trim();
    if (!q || chatBusy) return;
    chatBusy = true;
    $('chat-in').value = '';
    chatMsgs.push({ role: 'user', content: q });
    bubble('user', q);
    const deep = $('chat-deep').checked;
    const aiBubble = bubble('ai', deep ? '深想中…' : '…');
    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        body: JSON.stringify({ messages: chatMsgs, code: $('src').value, thinking: deep }),
      });
      if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).error || 'HTTP ' + resp.status);
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = '', answer = '';
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        let i;
        while ((i = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, i).trim();
          buf = buf.slice(i + 1);
          if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
          const delta = JSON.parse(line.slice(6)).choices?.[0]?.delta;
          if (delta?.content) { // 跳过 reasoning_content,只显示正文
            answer += delta.content;
            aiBubble.innerHTML = mdHtml(answer); // 流式期间实时渲染,未闭合记号收尾时自愈
            $('chat-msgs').scrollTop = $('chat-msgs').scrollHeight;
          }
        }
      }
      if (!answer) throw new Error('空回答');
      chatMsgs.push({ role: 'assistant', content: answer });
      localStorage.setItem(chatKey, JSON.stringify(chatMsgs));
    } catch (e) {
      chatMsgs.pop(); // 失败的问题不入历史,可改完重问
      aiBubble.className = 'msg err';
      aiBubble.textContent = '出错了: ' + e.message + '(serve.py 在跑吗?)';
    } finally {
      chatBusy = false;
    }
  }
  $('chat-in').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) { e.preventDefault(); chatSend(); }
  });

  // 轮询磁盘:CLI 先落占位图再让 AI 覆写,这里把成品自动换上来;有未保存编辑时不打扰
  let diskCache = $('src').value;
  setInterval(async () => {
    try {
      const remote = await (await fetch('./' + file + '?ts=' + Date.now())).text();
      if (remote !== diskCache) {
        diskCache = remote;
        if (!dirty) { $('src').value = remote; render(); }
        refreshList(); // CLI 完成后会顺带起好名,这里把标题也换上
      }
    } catch {}
  }, 2000);
</script>
</body>
</html>
